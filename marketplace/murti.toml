# Murti — Core LLM model runtime engine for AGNOS
# Model registry, store, pull, inference backends, GPU allocation, quantization.
# Shared engine used by hoosh (gateway) and Irfan (LLM server).
#
# Name: Murti (Sanskrit: मूर्ति — form, embodiment)
# Lib: murti = "0.1.0" in Cargo.toml
#
# Status: Released — v0.1.0.

[package]
name = "murti"
version = "0.1.0"
description = "Murti — Core LLM model runtime engine"
license = "GPL-3.0-only"
groups = ["library", "ai", "inference", "rust"]
release = 1
arch = "any"

[source]
github_release = "MacCracken/murti"
release_asset = "source"
sha256 = ""  # TODO: populate from release tarball

[depends]
runtime = []
build = [
    "rust",
]

[marketplace]
category = "library"
runtime = "rust-crate"
publisher = "AGNOS"
tags = ["llm", "inference", "model", "gpu", "gguf", "ollama", "runtime", "rust"]
min_agnos_version = "2026.3.21"

[marketplace.sandbox]
seccomp_mode = "basic"
network_access = true

[build]
make = "cargo build --release"
check = "cargo test"
install = """
# Library crate — consumers add to Cargo.toml:
#   murti = "0.1.0"
# Install source for offline/air-gapped Cargo builds.
mkdir -p $PKG/usr/lib/murti
cp -r src $PKG/usr/lib/murti/
cp Cargo.toml $PKG/usr/lib/murti/
cp VERSION $PKG/usr/lib/murti/
"""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
