# Sankhya — Ancient mathematical systems for AGNOS
# Historical math systems, number theory, ancient algorithms.
#
# Name: Sankhya (Sanskrit: number/enumeration)
# Lib: sankhya = "1.0.0" in Cargo.toml
#
# Status: Released — v1.0.0.

[package]
name = "sankhya"
version = "1.0.0"
description = "Sankhya — ancient mathematical systems"
license = "GPL-3.0-only"
groups = ["library", "science", "rust"]
release = 1
arch = "any"

[source]
github_release = "MacCracken/sankhya"
release_asset = "source"
sha256 = ""  # TODO: populate from release tarball

[depends]
runtime = []
build = ["rust"]

[marketplace]
category = "library"
runtime = "rust-crate"
publisher = "AGNOS"
tags = ["mathematics", "ancient", "number-theory", "history", "science", "rust"]
min_agnos_version = "2026.3.24"

[marketplace.sandbox]
seccomp_mode = "basic"
network_access = false

[build]
make = "cargo build --release"
check = "cargo test --all-features"
install = """
mkdir -p $PKG/usr/lib/sankhya
cp -r src $PKG/usr/lib/sankhya/
cp Cargo.toml $PKG/usr/lib/sankhya/
cp VERSION $PKG/usr/lib/sankhya/
"""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
