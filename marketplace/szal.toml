# Szál — Workflow engine (step/flow/DAG/rollback)
#
# Lib: szal = "1.0.1" in Cargo.toml
# Status: Stable — v1.0.1.

[package]
name = "szal"
version = "1.0.1"
description = "Szál — Workflow engine (step/flow/DAG/rollback)"
license = "GPL-3.0-only"
groups = ["library", "rust"]
release = 1
arch = "any"

[source]
crates_io = "szal"
github_release = "MacCracken/szal"
release_asset = "source"
sha256 = ""  # TODO: populate from release tarball

[depends]
runtime = []
build = ["rust"]

[marketplace]
category = "library"
runtime = "rust-crate"
publisher = "AGNOS"
tags = ["workflow", "pipeline", "dag", "orchestration", "rust"]
min_agnos_version = "2026.3.21"

[marketplace.sandbox]
seccomp_mode = "basic"
network_access = false

[build]
make = "cargo build --release"
check = "cargo test"
install = """
mkdir -p $PKG/usr/lib/szal
cp -r src $PKG/usr/lib/szal/
cp Cargo.toml $PKG/usr/lib/szal/
cp VERSION $PKG/usr/lib/szal/
"""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
