# Bijli — Electromagnetism engine for AGNOS
# Maxwell's equations, Lorentz force, FDTD, EM wave propagation.
#
# Name: Bijli (Hindi/Urdu: lightning/electricity)
# Lib: bijli = "1.1.0" in Cargo.toml
#
# Status: Stable — v1.1.0. Real EM physics, FDTD solver, sub-2ns field computation.

[package]
name = "bijli"
version = "1.1.0"
description = "Bijli — Electromagnetism engine"
license = "GPL-3.0-only"
groups = ["library", "science", "rust"]
release = 1
arch = "any"

[source]
github_release = "MacCracken/bijli"
release_asset = "source"
sha256 = ""  # TODO: populate from release tarball

[depends]
runtime = []
build = ["rust"]

[marketplace]
category = "library"
runtime = "rust-crate"
publisher = "AGNOS"
tags = ["electromagnetism", "maxwell", "fdtd", "physics", "science", "rust"]
min_agnos_version = "2026.3.24"

[marketplace.sandbox]
seccomp_mode = "basic"
network_access = false

[build]
make = "cargo build --release"
check = "cargo test --all-features"
install = """
mkdir -p $PKG/usr/lib/bijli
cp -r src $PKG/usr/lib/bijli/
cp Cargo.toml $PKG/usr/lib/bijli/
cp VERSION $PKG/usr/lib/bijli/
"""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
