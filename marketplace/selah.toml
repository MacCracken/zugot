# Selah — AI-native screenshot & annotation tool for AGNOS
# Wraps daimon screen capture API, adds annotation, OCR, redaction.
# Hebrew: סלה — pause/capture a moment.
#
# Status: Published — v0.29.4 (linux amd64 + arm64).
# Source: https://github.com/MacCracken/selah

[package]
name = "selah"
version = "0.29.4"
description = "Selah — AI-native screenshot & annotation tool for AGNOS"
license = "GPL-3.0-only"
groups = ["desktop", "tools"]
release = 1
arch = "x86_64"

[source]
github_release = "MacCracken/selah"
release_asset = "selah-*-linux-amd64.tar.gz"
sha256 = ""  # TODO: populate from release tarball

[depends]
runtime = [
    "glibc",
]
build = [
    "rust",
    "gcc",
    "make",
    "pkgconf",
]

[marketplace]
category = "desktop"
runtime = "native-binary"
publisher = "Selah"
tags = ["screenshot", "annotation", "ocr", "redaction", "ai", "capture"]
min_agnos_version = "2026.3.15"

[marketplace.sandbox]
seccomp_mode = "basic"
network_access = true
data_dir = "~/.local/share/selah/"

[[marketplace.sandbox.landlock]]
path = "~/.local/share/selah/"
access = "rw"

[[marketplace.sandbox.landlock]]
path = "/tmp/selah/"
access = "rw"

[marketplace.sandbox.network]
allowed = ["127.0.0.1:8090"]

[build]
pre_build = ""
configure = ""
make = "cargo build --release --workspace"
check = "cargo test --workspace"
install = """
mkdir -p $PKG/usr/local/bin
cp target/release/selah $PKG/usr/local/bin/selah
"""
post_install = ""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
