# Libro — Cryptographic audit chain for AGNOS
# Hash-linked tamper-proof event logging with SHA-256 and BLAKE3.
# Extensible hash algorithm support for future additions.
# Only local-first audit chain crate on crates.io.
#
# Name: Libro (Italian/Spanish: book/record)
# Lib: libro = "0.92.0" in Cargo.toml
#
# Status: Released — v0.92.0 (pre-1.0 hardening).

[package]
name = "libro"
version = "0.92.0"
description = "Libro — cryptographic audit chain (SHA-256, BLAKE3, extensible hash types)"
license = "GPL-3.0-only"
groups = ["library", "security", "audit", "rust"]
release = 1
arch = "any"

[source]
github_release = "MacCracken/libro"
release_asset = "source"
sha256 = ""  # TODO: populate from release tarball

[depends]
runtime = []
build = ["rust"]

[marketplace]
category = "library"
runtime = "rust-crate"
publisher = "AGNOS"
tags = ["audit", "logging", "cryptographic", "chain", "tamper-proof", "sha256", "blake3", "hash", "rust"]
min_agnos_version = "2026.3.24"

[marketplace.sandbox]
seccomp_mode = "basic"
network_access = false

[build]
make = "cargo build --release"
check = "cargo test --all-features"
install = """
mkdir -p $PKG/usr/lib/libro
cp -r src $PKG/usr/lib/libro/
cp Cargo.toml $PKG/usr/lib/libro/
cp VERSION $PKG/usr/lib/libro/
"""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
