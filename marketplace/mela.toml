# Mela — App marketplace for AGNOS
# Agent and application discovery, installation, updates, ratings.
#
# Name: Mela (Hindi: मेला — fair, gathering)
# Lib: mela = "0.1.0" in Cargo.toml
#
# Status: Released — v0.1.0.

[package]
name = "mela"
version = "0.1.0"
description = "Mela — app marketplace for AGNOS"
license = "GPL-3.0-only"
groups = ["library", "marketplace", "rust"]
release = 1
arch = "any"

[source]
github_release = "MacCracken/mela"
release_asset = "source"
sha256 = ""  # TODO: populate from release tarball

[depends]
runtime = []
build = ["rust"]

[marketplace]
category = "library"
runtime = "rust-crate"
publisher = "AGNOS"
tags = ["marketplace", "app-store", "discovery", "install", "rust"]
min_agnos_version = "2026.3.22"

[marketplace.sandbox]
seccomp_mode = "basic"
network_access = false

[build]
make = "cargo build --release"
check = "cargo test --all-features"
install = """
mkdir -p $PKG/usr/lib/mela
cp -r src $PKG/usr/lib/mela/
cp Cargo.toml $PKG/usr/lib/mela/
cp VERSION $PKG/usr/lib/mela/
"""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
