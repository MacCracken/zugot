# Takumi — Package build system for AGNOS
# Builds .ark packages from TOML recipes. Used by ark and bazaar.
#
# Name: Takumi (Japanese: 匠 — artisan, craftsman)
# Lib: takumi = "0.1.0" in Cargo.toml
#
# Status: Released — v0.1.0.

[package]
name = "takumi"
version = "0.1.0"
description = "Takumi — package build system for AGNOS (.ark packages from TOML recipes)"
license = "GPL-3.0-only"
groups = ["library", "package-management", "rust"]
release = 1
arch = "any"

[source]
github_release = "MacCracken/takumi"
release_asset = "source"
sha256 = ""  # TODO: populate from release tarball

[depends]
runtime = []
build = ["rust"]

[marketplace]
category = "library"
runtime = "rust-crate"
publisher = "AGNOS"
tags = ["build-system", "package", "recipe", "ark", "rust"]
min_agnos_version = "2026.3.22"

[marketplace.sandbox]
seccomp_mode = "basic"
network_access = false

[build]
make = "cargo build --release"
check = "cargo test --all-features"
install = """
mkdir -p $PKG/usr/lib/takumi
cp -r src $PKG/usr/lib/takumi/
cp Cargo.toml $PKG/usr/lib/takumi/
cp VERSION $PKG/usr/lib/takumi/
"""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
