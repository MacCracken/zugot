# lapack — Linear Algebra PACKage
#
# BLFS / AI Stack

[package]
name = "lapack"
version = "3.12.1"
description = "lapack — Linear algebra routines for numerical computing"
license = "BSD-3-Clause"
groups = ["ai", "ml", "math"]
release = 1
arch = "x86_64"

[source]
url = "https://github.com/Reference-LAPACK/lapack/archive/refs/tags/v3.12.1.tar.gz"
sha256 = "2ca6407a001a474d4d4d35f3a61550156050c48016d949f0da0529c0aa052422"
patches = []

[depends]
runtime = ["glibc", "gfortran", "openblas"]
build = ["gcc", "make", "pkgconf", "cmake", "gfortran"]

[build]
pre_build = ""
configure = """
mkdir -p build && cd build && \
cmake .. -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release
"""
make = "cd build && make -j$(nproc)"
check = "cd build && make test || true"
install = "cd build && make DESTDIR=$PKG install"
post_install = ""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
