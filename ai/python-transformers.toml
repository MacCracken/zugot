# python-transformers — HuggingFace Transformers library
#
# BLFS / AI Stack

[package]
name = "python-transformers"
version = "5.4.0"
description = "python-transformers — HuggingFace Transformers for state-of-the-art NLP and ML"
license = "Apache-2.0"
groups = ["ai", "ml", "python", "llm"]
release = 1
arch = "x86_64"

[source]
url = "https://github.com/huggingface/transformers/archive/refs/tags/v5.4.0.tar.gz"
sha256 = "384d2f72db4ae498f1450f24785b6b03396595485e4f43357fd9d2f062f9b356"
patches = []

[depends]
runtime = ["python3", "python-pytorch", "python-numpy"]
build = ["python3", "pip"]

[build]
pre_build = ""
configure = ""
make = ""
check = ""
install = "pip install --prefix=/usr --root=$PKG --no-deps ."
post_install = ""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
