# python-pandas — Data manipulation and analysis library
#
# BLFS / AI Stack

[package]
name = "python-pandas"
version = "3.0.1"
description = "python-pandas — Data manipulation and analysis library for Python"
license = "BSD-3-Clause"
groups = ["ai", "ml", "python"]
release = 1
arch = "x86_64"

[source]
url = "https://github.com/pandas-dev/pandas/releases/download/v3.0.1/pandas-3.0.1.tar.gz"
sha256 = "4186a699674af418f655dbd420ed87f50d56b4cd6603784279d9eef6627823c8"
patches = []

[depends]
runtime = ["python3", "python-numpy"]
build = ["python3", "pip", "cython"]

[build]
pre_build = ""
configure = ""
make = ""
check = ""
install = "pip install --prefix=/usr --root=$PKG --no-deps ."
post_install = ""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
