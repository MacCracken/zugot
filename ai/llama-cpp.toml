# llama-cpp — High-performance LLM inference in C/C++
#
# BLFS / AI Stack

[package]
name = "llama-cpp"
version = "b8579"
description = "llama-cpp — High-performance LLM inference engine in C/C++"
license = "MIT"
groups = ["ai", "ml", "llm"]
release = 1
arch = "x86_64"

[source]
url = "https://github.com/ggml-org/llama.cpp/archive/refs/tags/b8579.tar.gz"
sha256 = "a1be752ae72328183978d5a29d5c1ba227613f2d085fbf6aea3db6c926310e57"
patches = []

[depends]
runtime = ["glibc", "openblas"]
build = ["gcc", "make", "pkgconf", "cmake"]

[build]
pre_build = ""
configure = """
mkdir -p build && cd build && \
cmake .. -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release \
  -DGGML_BLAS=ON -DGGML_BLAS_VENDOR=OpenBLAS
"""
make = "cd build && make -j$(nproc)"
check = "cd build && make test || true"
install = "cd build && make DESTDIR=$PKG install"
post_install = ""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
