# yajl — Yet Another JSON Library (C)
#
# BLFS / AI Stack

[package]
name = "yajl"
version = "2.1.0"
description = "yajl — Yet Another JSON Library for C"
license = "ISC"
groups = ["ai", "libs"]
release = 1
arch = "x86_64"

[source]
url = "https://github.com/lloyd/yajl/archive/refs/tags/2.1.0.tar.gz"
sha256 = "3fb73364a5a30efe615046d07e6db9d09fd2b41c763c5f7d3bfb121cd5c5ac5a"
patches = []

[depends]
runtime = ["glibc"]
build = ["gcc", "make", "cmake"]

[build]
pre_build = ""
configure = """
mkdir -p build && cd build && \
cmake .. -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release
"""
make = "cd build && make -j$(nproc)"
check = "cd build && make test || true"
install = "cd build && make DESTDIR=$PKG install"
post_install = ""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
