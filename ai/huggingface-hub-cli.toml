# huggingface-hub-cli — HuggingFace Hub CLI for model downloads and management
#
# BLFS / AI Stack

[package]
name = "huggingface-hub-cli"
version = "1.8.0"
description = "huggingface-hub-cli — CLI for downloading and managing HuggingFace models and datasets"
license = "Apache-2.0"
groups = ["ai", "ml", "python", "tools"]
release = 1
arch = "x86_64"

[source]
url = "https://github.com/huggingface/huggingface_hub/archive/refs/tags/v1.8.0.tar.gz"
sha256 = "83ee76153047d23eec1f93e25ae6e70c8f390bc31a71b4919932dc3bdc615588"
patches = []

[depends]
runtime = ["python3"]
build = ["python3", "pip"]

[build]
pre_build = ""
configure = ""
make = ""
check = ""
install = "pip install --prefix=/usr --root=$PKG --no-deps ."
post_install = ""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
