# openssh — Secure shell
#
# BLFS

[package]
name = "openssh"
version = "10.0p1"
description = "openssh — Secure shell client and server"
license = "BSD-2-Clause"
groups = ["network"]
release = 1
arch = "x86_64"

[source]
url = "https://cdn.openbsd.org/pub/OpenBSD/OpenSSH/portable/openssh-10.0p1.tar.gz"
sha256 = "021a2e709a0edf4250b1256bd5a9e500411a90dddabea830ed59cef90eb9d85c"
patches = []

[depends]
runtime = ["glibc", "openssl", "zlib"]
build = ["gcc", "make", "pkgconf"]

[build]
pre_build = ""
configure = "./configure --prefix=/usr --sysconfdir=/etc/ssh --with-ssl-engine --disable-static"
make = "make -j$(nproc)"
check = "make check || true"
install = "make DESTDIR=$PKG install"
post_install = ""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
