# networkmanager — Network management
#
# BLFS

[package]
name = "networkmanager"
version = "1.51.4"
description = "networkmanager — Network connection management daemon"
license = "GPL-2.0-only"
groups = ["network"]
release = 1
arch = "x86_64"

[source]
url = "https://download.gnome.org/sources/NetworkManager/1.51/NetworkManager-1.51.4.tar.xz"
sha256 = "865a7cc5686a51d7efe81d7dcb3c5246bfa3b996a58629135354972804ff4d3c"
patches = []

[depends]
runtime = ["glibc", "glib", "dbus", "curl", "polkit", "wpa-supplicant", "dhcpcd"]
build = ["gcc", "make", "pkgconf"]

[build]
pre_build = ""
configure = """
mkdir -p build && cd build && \
meson setup .. --prefix=/usr --buildtype=release
"""
make = "cd build && ninja -j$(nproc)"
check = "cd build && meson test || true"
install = "cd build && DESTDIR=$PKG ninja install"
post_install = ""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
