# iw — WiFi config tool
#
# BLFS

[package]
name = "iw"
version = "6.17"
description = "iw — WiFi configuration and monitoring tool"
license = "ISC"
groups = ["network"]
release = 1
arch = "x86_64"

[source]
url = "https://kernel.org/pub/software/network/iw/iw-6.17.tar.xz"
sha256 = "7d182e498289ab39b257da6780d562e415377107f50358ee5b55b8cfe40b1e33"
patches = []

[depends]
runtime = ["glibc", "libnl"]
build = ["gcc", "make", "pkgconf"]

[build]
pre_build = ""
configure = ""
make = "make -j$(nproc) PREFIX=/usr"
check = ""
install = "make PREFIX=/usr DESTDIR=$PKG install"
post_install = ""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
