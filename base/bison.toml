# Bison — Parser generator
# GNU yacc replacement. Required by many packages (iproute2, nftables, etc.).
#
# LFS Ch. 8.32

[package]
name = "bison"
version = "3.8.2"
description = "GNU Bison — parser generator"
license = "GPL-3.0-only"
groups = ["base", "build", "tier1"]
release = 1
arch = "x86_64"

[source]
url = "https://ftp.gnu.org/gnu/bison/bison-3.8.2.tar.xz"
sha256 = "9bba0214ccf7f1079c5d59210045227bcf619519840ebfa80cd3849cff5a5bf2"
patches = []

[depends]
runtime = ["glibc", "m4"]
build = ["gcc", "make"]

[build]
pre_build = ""
configure = "./configure --prefix=/usr"
make = "make -j$(nproc)"
check = "make check || true"
install = "make DESTDIR=$PKG install"
post_install = ""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
