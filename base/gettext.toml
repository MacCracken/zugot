# Gettext — Internationalization framework
# Provides msgfmt, xgettext, and the libintl library for i18n.
#
# LFS Ch. 8.31

[package]
name = "gettext"
version = "0.26"
description = "GNU Gettext — internationalization framework"
license = "GPL-3.0-only"
groups = ["base", "build", "tier1"]
release = 1
arch = "x86_64"

[source]
url = "https://ftp.gnu.org/gnu/gettext/gettext-0.26.tar.xz"
sha256 = "d1fb86e260cfe7da6031f94d2e44c0da55903dbae0a2fa0fae78c91ae1b56f00"
patches = []

[depends]
runtime = ["glibc", "ncurses", "acl"]
build = ["gcc", "make"]

[build]
pre_build = ""
configure = """
./configure \
    --prefix=/usr \
    --disable-static
"""
make = "make -j$(nproc)"
check = "make check || true"
install = "make DESTDIR=$PKG install"
post_install = ""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
