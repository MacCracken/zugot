# Linux — AGNOS Kernel
# Linux 6.6 LTS with AGNOS custom modules (agent-subsystem, security, audit, llm).
# Config from kernel/agnos_defconfig.
#
# LFS Ch. 10.3

[package]
name = "linux"
version = "6.6.132"
description = "Linux kernel — AGNOS LTS build"
license = "GPL-2.0-only"
groups = ["base", "kernel", "tier0"]
release = 1
arch = "x86_64"

[source]
url = "https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.6.132.tar.xz"
sha256 = "c5b62bbb104f5fddf6be6f50ebd170146c1995d2cc84e591a914decb4b6b2eb4"
patches = []

[depends]
runtime = []
build = ["gcc", "make", "bc", "flex", "bison", "elfutils", "openssl", "perl", "kmod"]

[build]
pre_build = """
# Clean the source tree
make mrproper

# Copy AGNOS kernel config
if [ -f /etc/agnos/kernel/agnos_defconfig ]; then
    cp /etc/agnos/kernel/agnos_defconfig .config
else
    # Use the in-tree defconfig as fallback
    make defconfig
fi

# Ensure config is complete
make olddefconfig
"""
configure = ""
make = "make -j$(nproc)"
check = ""
install = """
mkdir -p $PKG/boot
mkdir -p $PKG/usr/lib/modules

# Install the kernel image
install -vm755 arch/x86/boot/bzImage $PKG/boot/vmlinuz-6.6.132-agnos

# Install modules
make INSTALL_MOD_PATH=$PKG/usr modules_install

# Install System.map
install -vm644 System.map $PKG/boot/System.map-6.6.132-agnos

# Install kernel config for reference
install -vm644 .config $PKG/boot/config-6.6.132-agnos

# Remove build/source symlinks (they point to the build host)
rm -fv $PKG/usr/lib/modules/6.6.132-agnos/build
rm -fv $PKG/usr/lib/modules/6.6.132-agnos/source
"""
post_install = ""

[security]
# Kernel has its own build flags
hardening = []
cflags = ""
ldflags = ""
