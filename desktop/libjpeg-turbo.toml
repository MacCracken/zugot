# libjpeg-turbo — JPEG image codec with SIMD acceleration
#
# BLFS

[package]
name = "libjpeg-turbo"
version = "3.1.4.1"
description = "libjpeg-turbo — JPEG image codec with SIMD acceleration"
license = "BSD-3-Clause"
groups = ["desktop", "graphics"]
release = 1
arch = "x86_64"

[source]
url = "https://github.com/libjpeg-turbo/libjpeg-turbo/releases/download/3.1.4.1/libjpeg-turbo-3.1.4.1.tar.gz"
sha256 = "ecae8008e2cc9ade2f2c1bb9d5e6d4fb73e7c433866a056bd82980741571a022"
patches = []

[depends]
runtime = ["glibc"]
build = ["gcc", "make", "pkgconf", "cmake"]

[build]
pre_build = ""
configure = """
mkdir -p build && cd build && \
cmake .. -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release
"""
make = "cd build && make -j$(nproc)"
check = "cd build && make test || true"
install = "cd build && make DESTDIR=$PKG install"
post_install = ""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
