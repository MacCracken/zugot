[package]
name = "wl-clipboard"
version = "2.2.1"
description = "Wayland clipboard copy/paste utilities (wl-copy, wl-paste)"
license = "GPL-3.0-only"
groups = ["desktop"]
release = 1
arch = "x86_64"

[source]
url = "https://github.com/bugaevc/wl-clipboard/archive/refs/tags/v2.2.1.tar.gz"
sha256 = "6eb8081207fb5581d1d82c4bcd9587205a31a3d47bea3ebeb7f41aa1143783eb"
patches = []

[depends]
runtime = ["wayland", "wayland-protocols"]
build = ["meson", "ninja"]
optional = []

[build]
pre_build = ""
configure = """
meson setup build \
    --prefix=/usr \
    --buildtype=release
"""
make = "ninja -C build -j$(nproc)"
check = ""
install = "DESTDIR=$PKG ninja -C build install"

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
