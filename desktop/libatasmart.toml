# libatasmart — ATA S.M.A.R.T. reading and parsing library
#
# BLFS

[package]
name = "libatasmart"
version = "0.19"
description = "libatasmart — ATA S.M.A.R.T. reading and parsing library"
license = "LGPL-2.1-only"
groups = ["desktop", "system"]
release = 1
arch = "x86_64"

[source]
url = "https://0pointer.de/public/libatasmart-0.19.tar.xz"
sha256 = "61f0ea345f63d28ab2ff0dc352c22271661b66bf09642db3a4049ac9dbdb0f8d"
patches = []

[depends]
runtime = ["glibc", "eudev"]
build = ["gcc", "make", "pkgconf"]

[build]
pre_build = ""
configure = "./configure --prefix=/usr --disable-static"
make = "make -j$(nproc)"
check = "make check || true"
install = "make DESTDIR=$PKG install"
post_install = ""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
