[package]
name = "librsvg"
version = "2.62.0"
description = "SVG rendering library written in Rust"
license = "LGPL-2.1-only"
groups = ["desktop"]
release = 1
arch = "x86_64"

[source]
url = "https://download.gnome.org/sources/librsvg/2.62/librsvg-2.62.0.tar.xz"
sha256 = "4278ddc1195ab82f4fd834ac1f5aa75ac1685f3cc5484bb0eaebe03a790b8d82"
patches = []

[depends]
runtime = ["glib", "cairo", "pango", "gdk-pixbuf", "libxml2"]
build = ["meson", "ninja", "rust", "python", "gobject-introspection"]
optional = []

[build]
pre_build = ""
configure = """
meson setup build \
    --prefix=/usr \
    --buildtype=release \
    -Dintrospection=enabled \
    -Dpixbuf-loader=enabled \
    -Dvala=disabled \
    -Ddocs=disabled
"""
make = "ninja -C build -j$(nproc)"
check = "ninja -C build test || true"
install = "DESTDIR=$PKG ninja -C build install"

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
