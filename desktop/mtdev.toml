# mtdev — Multitouch protocol translation library
#
# BLFS

[package]
name = "mtdev"
version = "1.1.7"
description = "mtdev — Multitouch protocol translation library"
license = "MIT"
groups = ["desktop", "input"]
release = 1
arch = "x86_64"

[source]
url = "https://bitmath.org/code/mtdev/mtdev-1.1.7.tar.bz2"
sha256 = "a107adad2101fecac54ac7f9f0e0a0dd155d954193da55c2340c97f2ff1d814e"
patches = []

[depends]
runtime = ["glibc"]
build = ["gcc", "make", "pkgconf"]

[build]
pre_build = ""
configure = "./configure --prefix=/usr --disable-static"
make = "make -j$(nproc)"
check = "make check || true"
install = "make DESTDIR=$PKG install"
post_install = ""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
