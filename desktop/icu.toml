[package]
name = "icu"
version = "76.1"
description = "International Components for Unicode — C/C++ globalization library"
license = "ICU"
groups = ["desktop"]
release = 1
arch = "x86_64"

[source]
url = "https://github.com/unicode-org/icu/releases/download/release-76-1/icu4c-76_1-src.tgz"
sha256 = "dfacb46bfe4747410472ce3e1144bf28a102feeaa4e3875bac9b4c6cf30f4f3e"
patches = []

[depends]
runtime = []
build = ["python"]
optional = []

[build]
pre_build = "cd source"
configure = """
cd source && ./configure \
    --prefix=/usr \
    --sysconfdir=/etc \
    --enable-shared
"""
make = "cd source && make -j$(nproc)"
check = "cd source && make check || true"
install = "cd source && make DESTDIR=$PKG install"

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
