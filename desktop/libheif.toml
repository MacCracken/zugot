[package]
name = "libheif"
version = "1.21.2"
description = "HEIF and AVIF file format decoder and encoder library"
license = "LGPL-3.0-only"
groups = ["desktop"]
release = 1
arch = "x86_64"

[source]
url = "https://github.com/strukturag/libheif/releases/download/v1.21.2/libheif-1.21.2.tar.gz"
sha256 = "75f530b7154bc93e7ecf846edfc0416bf5f490612de8c45983c36385aa742b42"
patches = []

[depends]
runtime = ["libde265", "x265", "libpng", "libjpeg-turbo"]
build = ["cmake", "ninja"]
optional = []

[build]
pre_build = ""
configure = """
cmake -B build -G Ninja \
    -DCMAKE_INSTALL_PREFIX=/usr \
    -DCMAKE_BUILD_TYPE=Release \
    -DWITH_EXAMPLES=OFF
"""
make = "ninja -C build -j$(nproc)"
check = "ninja -C build test || true"
install = "DESTDIR=$PKG ninja -C build install"

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
