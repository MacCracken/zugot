# udisks — Disk management service
#
# BLFS

[package]
name = "udisks"
version = "2.10.1"
description = "udisks — D-Bus interface for disk management operations"
license = "GPL-2.0-only"
groups = ["desktop", "libs"]
release = 1
arch = "x86_64"

[source]
url = "https://github.com/storaged-project/udisks/releases/download/udisks-2.10.1/udisks-2.10.1.tar.bz2"
sha256 = "b75734ccf602540dedb4068bec206adcb508a4c003725e117ae8f994d92d8ece"
patches = []

[depends]
runtime = ["glibc", "glib", "polkit", "libatasmart", "libblockdev"]
build = ["gcc", "make", "pkgconf"]

[build]
pre_build = ""
configure = "./configure --prefix=/usr --disable-static"
make = "make -j$(nproc)"
check = "make check || true"
install = "make DESTDIR=$PKG install"
post_install = ""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
