[package]
name = "sqlite"
version = "3.51.3"
description = "Self-contained, serverless, zero-configuration SQL database engine"
license = "Public Domain"
groups = ["desktop"]
release = 1
arch = "x86_64"

[source]
url = "https://www.sqlite.org/2026/sqlite-autoconf-3510300.tar.gz"
sha256 = "81f5be397049b0cae1b167f2225af7646fc0f82e4a9b3c48c9ea3a533e21d77a"
patches = []

[depends]
runtime = ["readline", "zlib"]
build = []
optional = []

[build]
pre_build = ""
configure = """
./configure \
    --prefix=/usr \
    --enable-fts5 \
    --enable-json1 \
    --enable-session \
    CFLAGS="$CFLAGS -DSQLITE_ENABLE_FTS3=1 -DSQLITE_ENABLE_FTS4=1 -DSQLITE_ENABLE_COLUMN_METADATA=1 -DSQLITE_ENABLE_UNLOCK_NOTIFY=1 -DSQLITE_SECURE_DELETE=1"
"""
make = "make -j$(nproc)"
check = "make check || true"
install = "make DESTDIR=$PKG install"

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
