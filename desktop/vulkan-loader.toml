# Vulkan Loader — Vulkan ICD loader
# Dispatches Vulkan API calls to installable client drivers
#
# BLFS

[package]
name = "vulkan-loader"
version = "1.4.341"
description = "Vulkan Loader — Vulkan ICD loader library"
license = "Apache-2.0"
groups = ["desktop", "graphics"]
release = 1
arch = "x86_64"

[source]
url = "https://github.com/KhronosGroup/Vulkan-Loader/archive/refs/tags/v1.4.341.tar.gz"
sha256 = "9a8c6f1aace4a03641429a09bc823073f2375abf2d62ac5a4d38c46e732b2d85"
patches = []

[depends]
runtime = ["glibc", "vulkan-headers"]
build = ["cmake", "gcc", "make", "pkgconf"]

[build]
pre_build = ""
configure = """
mkdir -p build && cd build && \
cmake .. -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release
"""
make = "cd build && make -j$(nproc)"
check = "cd build && make test || true"
install = "cd build && make DESTDIR=$PKG install"
post_install = ""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
