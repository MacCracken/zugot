# pipewire — Audio/video routing server
#
# BLFS

[package]
name = "pipewire"
version = "1.4.11"
description = "pipewire — Low-latency audio and video routing server"
license = "MIT"
groups = ["desktop", "audio"]
release = 1
arch = "x86_64"

[source]
url = "https://github.com/PipeWire/pipewire/archive/refs/tags/1.4.11.tar.gz"
sha256 = "49a6cf6ea7a34acd3a9dd05e0758ce5831f1918e1ce47b7ab66662a357045504"
patches = []

[depends]
runtime = ["glibc", "alsa-lib", "dbus", "glib"]
build = ["gcc", "make", "pkgconf"]

[build]
pre_build = ""
configure = """
mkdir -p build && cd build && \
meson setup .. --prefix=/usr --buildtype=release
"""
make = "cd build && ninja -j$(nproc)"
check = "cd build && meson test || true"
install = "cd build && DESTDIR=$PKG ninja install"
post_install = ""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
