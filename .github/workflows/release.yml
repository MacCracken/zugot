name: release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Resolve version from tag
        id: ver
        run: |
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Verify VERSION file matches tag
        run: |
          file_version="$(tr -d '[:space:]' < VERSION)"
          if [ "$file_version" != "${{ steps.ver.outputs.version }}" ]; then
            echo "::error::VERSION file ($file_version) does not match tag (${{ steps.ver.outputs.version }})"
            exit 1
          fi

      - name: Validate recipes
        run: python3 scripts/validate_recipes.py

      - name: Extract CHANGELOG section
        id: notes
        run: |
          python3 - <<'PY' > RELEASE_NOTES.md
          import re, pathlib, os
          version = "${{ steps.ver.outputs.version }}"
          text = pathlib.Path("CHANGELOG.md").read_text()
          pat = re.compile(
              rf"^##\s*\[{re.escape(version)}\][^\n]*\n(.*?)(?=^##\s*\[|\Z)",
              re.MULTILINE | re.DOTALL,
          )
          m = pat.search(text)
          if not m:
              raise SystemExit(f"No CHANGELOG section found for [{version}]")
          print(m.group(1).strip())
          PY

      - name: Build release tarball
        run: |
          name="zugot-${{ steps.ver.outputs.version }}"
          git archive --format=tar.gz --prefix="${name}/" -o "${name}.tar.gz" "${GITHUB_REF_NAME}"
          sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          name="zugot-${{ steps.ver.outputs.version }}"
          gh release create "${GITHUB_REF_NAME}" \
            --title "zugot ${{ steps.ver.outputs.version }}" \
            --notes-file RELEASE_NOTES.md \
            "${name}.tar.gz" \
            "${name}.tar.gz.sha256"
